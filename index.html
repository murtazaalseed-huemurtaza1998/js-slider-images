<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>JS Slider Pro - Product Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider-container">
    <div id="slide-number" class="slide-number"></div>

    
    <img src="item1.jpg" alt="Fitness eats" loading="lazy" />
    <img src="item2.jpg" alt="eates health" loading="lazy" />
    <img src="item3.jpg" alt="running important" loading="lazy" />
    <img src="item4.jpg" alt="photo" loading="lazy" />
    <img src="item5.jpg" alt="photo" loading="lazy" />
    <img src="item6.jpg" alt="eats" loading="lazy" />
  </div>

  <div class="slider-controls">
    <span id="prev" class="prev">Previous</span>
    <span id="indicators" class="indicators"></span>
    <span id="play-pause" class="play-pause">Pause</span>
    <span id="next" class="next">Next</span>
  </div>
  <script src="main.js"></script>
</body>
</html>
