<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Slider Pro </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider-container">
    <div id="slide-number" class="slide-number"></div>
    
    <img src="img1.png" alt="Slide 1" class="active">
    <img src="img2.png" alt="Slide 2">
    <img src="img3.png" alt="Slide 3">
    <img src="img4.png" alt="Slide 4">
    <img src="img5.png" alt="Slide 5">
    <img src="img6.png" alt="Slide 6">
  </div>

  <div class="slider-controls">
    <span id="prev" class="prev">previous</span>
    <span id="indicators" class="indicators"></span>
    <span id="play-pause" class="play-pause">إيقاف</span>
    <span id="next" class="next">next</span>
  </div>
  <script src="main.js"></script>
</body>
</html>
