<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>JS Slider Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider-container">
    <div id="slide-number" class="slide-number"></div>

    <img src="img1.png" alt="Slide 1 Description" loading="lazy" />
    <img src="img2.png" alt="Slide 2 Description" loading="lazy" />
    <img src="img3.png" alt="Slide 3 Description" loading="lazy" />
    <img src="img4.png" alt="Slide 4 Description" loading="lazy" />
    <img src="img5.png" alt="Slide 5 Description" loading="lazy" />
    <img src="img6.png" alt="Slide 6 Description" loading="lazy" />
  </div>

  <div class="slider-controls">
    <span id="prev" class="prev">Previous</span>
    <span id="indicators" class="indicators"></span>
    <span id="play-pause" class="play-pause">Pause</span>
    <span id="next" class="next">Next</span>
  </div>
  <script src="main.js"></script>
</body>
</html>
